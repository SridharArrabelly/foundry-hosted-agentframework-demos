# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    hosted-agentframework-agent:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
                scale:
                    maxReplicas: 1
            startupCommand: python main.py
    hosted-agentframework-workflow:
        project: ./workflows
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
                scale:
                    maxReplicas: 1
            startupCommand: python main.py
infra:
    provider: bicep
    path: ./infra
hooks:
    postdeploy:
        windows:
            shell: pwsh
            run: infra/hooks/postdeploy.ps1
            interactive: true
        posix:
            name: postdeploy
            kind: sh
            shell: sh
            run: infra/hooks/postdeploy.sh
            interactive: true
    postprovision:
        windows:
            shell: pwsh
            run: infra/hooks/postprovision.ps1
            interactive: true
        posix:
            name: postprovision
            kind: sh
            shell: sh
            run: infra/hooks/postprovision.sh
            interactive: true
